apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: beep-auth
  namespace: beep-auth-development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beep-auth
  template:
    metadata:
      labels:
        app: beep-auth
    spec:
      containers:
        - name: beep-auth
          image: faro-registry:5000/beep-auth:master-v0.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  strategy:
    canary: {}
