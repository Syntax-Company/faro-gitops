apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: faro-landing-backend
  namespace: faro-landing-backend-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faro-landing-backend
  template:
    metadata:
      labels:
        app: faro-landing-backend
    spec:
      containers:
        - name: faro-landing-backend
          image: 104.248.9.67:5000/faro-landing-backend:v1.0.1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: 1
              memory: 1Gi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: DATABASE__URL
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: PORT
            - name: UPLOAD_DIR
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: UPLOAD__DIR
            - name: MAX_FILE_SIZE
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: MAX__FILE__SIZE
            - name: ALLOWED_MIME_TYPES
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: ALLOWED__MIME__TYPES
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: API__KEY
            - name: THROTTLE_TTL
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: THROTTLE__TTL
            - name: THROTTLE_LIMIT
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: THROTTLE__LIMIT
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: faro-landing-backend-production-secrets
                  key: CORS__ORIGIN
  strategy:
    canary: {}
